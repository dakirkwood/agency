name: Deploy to GitHub Pages

# Publish the static site whenever main updates; allow manual runs too.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish, but coalesce queued runs so only the
# latest commit ships.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # No build step — the site is served from the public/ folder as-is.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
